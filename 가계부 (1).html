<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="가계부">
<meta name="theme-color" content="#4F46E5">
<title>가계부</title>
<style>
:root {
  --bg:#f5f5f3;--surface:#fff;--border:rgba(0,0,0,.07);--border-md:rgba(0,0,0,.13);
  --text:#1a1a1a;--sub:#888;--hint:#bbb;
  --green:#16a34a;--green-bg:#f0fdf4;--green-lt:#dcfce7;
  --red:#dc2626;--red-bg:#fef2f2;--red-lt:#fee2e2;
  --blue:#4F46E5;--blue-bg:#eef2ff;--blue-lt:#e0e7ff;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-lt:#fef3c7;
  --r:14px;--rs:9px;--rx:6px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--text)}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:.5px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr 1fr;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nb{padding:10px 4px 8px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--hint)}
.nb.active{color:var(--blue)}
.ni{font-size:20px}
.page{display:none;max-width:480px;margin:0 auto;padding:16px 14px 90px}
.page.active{display:block}
.card{background:var(--surface);border-radius:var(--r);border:.5px solid var(--border);padding:14px;margin-bottom:12px}
.ct{font-size:13px;font-weight:700;color:var(--sub);margin-bottom:12px}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.mb{background:none;border:none;font-size:20px;cursor:pointer;color:var(--sub);padding:4px 10px}
.ml{font-size:18px;font-weight:700}
.sgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.sc{background:var(--surface);border-radius:var(--rs);border:.5px solid var(--border);padding:10px 8px;text-align:center}
.sl{font-size:11px;color:var(--sub);margin-bottom:3px}
.sv{font-size:15px;font-weight:700}
.br{display:flex;flex-direction:column;gap:3px;margin-bottom:10px}
.br:last-child{margin-bottom:0}
.bt{display:flex;justify-content:space-between;align-items:baseline}
.bn{font-size:13px;font-weight:500}
.bv{font-size:12px;color:var(--sub)}
.bv span{font-weight:600}
.gb{height:6px;background:var(--bg);border-radius:99px;overflow:hidden}
.gf{height:100%;border-radius:99px;transition:width .4s}
.go{background:var(--green)}.gw{background:var(--amber)}.gr{background:var(--red)}
.cr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.cr:last-child{margin-bottom:0}
.cn{font-size:12px;font-weight:500;min-width:62px}
.cb{flex:1}
.cv{font-size:11px;color:var(--sub);text-align:right;min-width:68px}
.cv b{color:var(--text)}
.type-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px;margin-bottom:14px}
.tbtn{padding:9px 4px;border:.5px solid var(--border-md);border-radius:var(--rs);background:transparent;font-size:13px;font-weight:700;cursor:pointer;color:var(--sub)}
.tbtn.ao{background:var(--red-bg);color:var(--red);border-color:rgba(220,38,38,.2)}
.tbtn.ai{background:var(--green-bg);color:var(--green);border-color:rgba(22,163,74,.2)}
.tbtn.am{background:var(--blue-bg);color:var(--blue);border-color:rgba(79,70,229,.2)}
.field{margin-bottom:11px}
.field label{display:block;font-size:12px;color:var(--sub);margin-bottom:4px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:10px 11px;font-size:15px;border:.5px solid var(--border-md);border-radius:var(--rs);background:var(--surface);color:var(--text);font-family:inherit;-webkit-appearance:none;appearance:none}
.field textarea{resize:none;min-height:58px;line-height:1.6}
.field.dis{opacity:.3;pointer-events:none}
.sl2{font-size:12px;color:var(--sub);margin-bottom:7px;font-weight:700}
.cgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px}
.cbtn{padding:9px 4px;border:.5px solid var(--border);border-radius:var(--rs);background:var(--bg);font-size:11px;cursor:pointer;color:var(--text);text-align:center;line-height:1.4}
.cbtn.sel{border-color:rgba(79,70,229,.4);background:var(--blue-bg);color:var(--blue);font-weight:700}
.sgrid2{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:12px}
.sbtn{padding:9px 6px;border:.5px solid var(--border);border-radius:var(--rs);background:var(--bg);font-size:12px;cursor:pointer;color:var(--text);text-align:center}
.sbtn.sel{border-color:rgba(79,70,229,.4);background:var(--blue-bg);color:var(--blue);font-weight:700}
.nbox{background:var(--bg);border:.5px solid var(--border-md);border-radius:var(--rs);padding:12px;margin-bottom:12px}
.nhd{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.nlbl{font-size:12px;font-weight:700;color:var(--sub)}
.nclr{font-size:11px;color:var(--hint);background:none;border:none;cursor:pointer}
.nprev{margin-top:8px;padding:9px 11px;background:var(--surface);border-radius:var(--rx);border-left:2px solid var(--blue);font-size:13px;line-height:1.7;white-space:pre-wrap;word-break:break-all;display:none}
.chip{display:inline-block;cursor:pointer;padding:4px 10px;border-radius:99px;font-size:12px;font-weight:700;margin:3px 3px 0 0}
.ca{background:var(--blue-lt);color:var(--blue)}
.cd{background:var(--green-lt);color:var(--green)}
.cc{background:var(--amber-lt);color:var(--amber)}
.add-btn{width:100%;padding:14px;border:none;border-radius:var(--rs);font-size:16px;font-weight:700;cursor:pointer;background:var(--blue);color:#fff}
.add-btn:active{opacity:.85}
.entry{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--border)}
.ei{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.einfo{flex:1;min-width:0}
.edesc{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emeta{font-size:11px;color:var(--sub);margin-top:2px}
.eamt{font-size:14px;font-weight:700;flex-shrink:0}
.ap{color:var(--green)}.am2{color:var(--red)}.av{color:var(--blue)}
.del{background:none;border:none;font-size:14px;cursor:pointer;color:var(--hint);padding:4px}
.empty{text-align:center;padding:30px;color:var(--hint);font-size:13px}
.srow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--border)}
.srow:last-child{border-bottom:none}
.sname{font-size:13px}
.sright{text-align:right}
.samt{font-size:14px;font-weight:700}
.sgoal{font-size:11px;color:var(--sub);margin-top:1px}
.div{height:.5px;background:var(--border);margin:10px 0}
.trow{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.tlbl{font-size:13px;color:var(--sub)}
.tval{font-size:15px;font-weight:700}
.tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:99px;font-weight:700;margin-left:4px}
.to{background:var(--red-lt);color:var(--red)}
.tw{background:var(--amber-lt);color:var(--amber)}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="page active" id="page-home">
  <div class="month-nav">
    <button class="mb" onclick="changeMonth(-1)">‹</button>
    <div class="ml" id="month-label"></div>
    <button class="mb" onclick="changeMonth(1)">›</button>
  </div>
  <div class="sgrid">
    <div class="sc"><div class="sl">수입</div><div class="sv" style="color:var(--green)" id="h-in">₩0</div></div>
    <div class="sc"><div class="sl">지출</div><div class="sv" style="color:var(--red)" id="h-out">₩0</div></div>
    <div class="sc"><div class="sl">잔액</div><div class="sv" id="h-bal">₩0</div></div>
  </div>
  <div class="card"><div class="ct">📊 카테고리 예산</div><div id="budget-list"></div></div>
  <div class="card"><div class="ct">💳 카드 현황</div><div id="card-list"></div></div>
</div>

<div class="page" id="page-input">
  <div class="nbox">
    <div class="nhd"><span class="nlbl">알림 붙여넣기</span><button class="nclr" onclick="clearNotif()">지우기</button></div>
    <textarea id="notif-input" placeholder="카드 알림 붙여넣으면 금액/날짜/카드 자동인식 👇" oninput="onNotif(this.value)" style="width:100%;background:transparent;border:none;font-size:13px;font-family:inherit;resize:none;min-height:54px;color:var(--text);outline:none"></textarea>
    <div class="nprev" id="nprev"></div>
  </div>
  <div class="card" style="padding:14px">
    <div class="type-row">
      <button class="tbtn ao" id="tb-out" onclick="setType('지출')">지출</button>
      <button class="tbtn" id="tb-in" onclick="setType('수입')">수입</button>
      <button class="tbtn" id="tb-mv" onclick="setType('이동')">이동</button>
    </div>
    <div class="field"><label>날짜</label><input type="date" id="f-date"/></div>
    <div><div class="sl2">대분류</div><div class="cgrid" id="major-grid"></div>
    <div id="sub-sec" style="display:none"><div class="sl2">소분류</div><div class="sgrid2" id="sub-grid"></div></div></div>
    <div class="field"><label>내용</label><input type="text" id="f-memo" placeholder="메모 (선택)"/></div>
    <div class="field"><label>금액</label><input type="number" id="f-amount" placeholder="0" inputmode="numeric"/></div>
    <div class="field" id="f-in-wrap"><label>입금계좌</label><select id="f-in-acct"></select></div>
    <div class="field" id="f-out-wrap"><label>출금계좌</label><select id="f-out-acct"></select></div>
    <button class="add-btn" onclick="addEntry()">+ 추가하기</button>
  </div>
</div>

<div class="page" id="page-history">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <div style="font-size:16px;font-weight:700" id="hist-month"></div>
    <button onclick="exportXLSX()" style="padding:7px 14px;font-size:12px;border:.5px solid var(--border-md);border-radius:var(--rx);background:transparent;color:var(--sub);cursor:pointer">엑셀 저장</button>
  </div>
  <div id="entry-list"><div class="empty">아직 내역이 없어요</div></div>
</div>

<div class="page" id="page-saving">
  <div class="card"><div class="ct">🎯 이달 저축 목표</div><div id="saving-list"></div>
    <div class="div"></div>
    <div class="trow"><span class="tlbl">목표 합계</span><span class="tval" style="color:var(--blue)">₩2,750,000</span></div>
    <div class="trow"><span class="tlbl">실제 저축</span><span class="tval" id="act-sav" style="color:var(--green)">₩0</span></div>
  </div>
  <div class="card"><div class="ct">💡 수입 대비 현황</div><div id="inc-summary"></div></div>
</div>

<nav class="nav">
  <button class="nb active" onclick="goPage('home',this)"><span class="ni">🏠</span>홈</button>
  <button class="nb" onclick="goPage('input',this)"><span class="ni">✏️</span>입력</button>
  <button class="nb" onclick="goPage('history',this)"><span class="ni">📋</span>내역</button>
  <button class="nb" onclick="goPage('saving',this)"><span class="ni">💰</span>저축</button>
</nav>
<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const CAT={
  '지출':{
    '🏠 주거비':['전세대출이자','관리비','전기세','도시가스','상수도비','기타세금','구독비','TV수신료'],
    '🗃️ 보험':['우체국보험','메리츠화재','메리츠화재2','삼성화재'],
    '📞 통신비':['LGU+','삼케','LG알뜰(우릉교)'],
    '🍀 곗돈':['가족곗돈','대딩곗돈','친척곗돈'],
    '☀️ 엄마':['엄마대출원금','엄마대출이자','엄마생활비','엄마보험(삼성생명)','엄마보험(DB 손해)','엄마보험(보람상조)','엄마보험(라이나)','엄마핸드폰(LGU+)','엄마핸드폰(삼케)','엄마건강'],
    '🍽️ 식비':['식자재','배달식비','외식','카페류','가족식비'],
    '🛒 생활용품':['생활소모품','가전/가구','침구/인테리어'],
    '👗 꾸밈비':['의류/잡화','미용/헤어','세탁/수선'],
    '👩‍🎓 자기계발':['스터디/수강','운동','도서'],
    '😷 건강':['병원/약국','건강보조','예방/검진','목욕'],
    '🚌 교통비':['대중교통','택시비','기차'],
    '🎁 경조사':['가족/친척','지인/동료'],
    '📺 문화생활':['공연/전시','OTT','기타 입장료','덕질'],
    '✔️ 기타':['회비','기타2','집 관련 지출']
  },
  '수입':{'👷 근로소득':['월급','보너스'],'💵 금융소득':['이자소득'],'💰 기타소득':['1/n, 카드환불','기타1','부수입']},
  '이동':{'예적금':['주택청약저축','자유적금','전세대출원금'],'연금':['개인연금'],'주식':['ISA'],'목적':['집계약용'],'목적2':['비상금','덕질']}
};
const BUDGET={'🏠 주거비':904890,'🗃️ 보험':393130,'📞 통신비':48300,'🍀 곗돈':100000,'☀️ 엄마':772187,'🍽️ 식비':300000,'🛒 생활용품':30000,'👗 꾸밈비':30000,'👩‍🎓 자기계발':50000,'😷 건강':50000,'🚌 교통비':60000,'🎁 경조사':0,'📺 문화생활':0,'✔️ 기타':50000};
const CARD_BUDGET={'롯카':318910,'롯카!':0,'롯카-':13000,'삼카':284237,'삼카!':0,'신카':60000,'신카!':240000,'국카1':161140,'국카k':111140,'국카k!':188860,'국카k!실미':60000,'국카k-':15000};
const SAVE_GOALS=[{name:'주택청약저축',goal:0},{name:'자유적금',goal:0},{name:'전세대출원금',goal:600000},{name:'개인연금',goal:400000},{name:'ISA',goal:500000},{name:'집계약용',goal:1000000},{name:'비상금',goal:200000},{name:'덕질',goal:50000}];
const ACCOUNTS=['KB뱅크','NH뱅크','케이-덕질','케이-비상금','케이-임시','케이뱅크','하나은행','KB 펀드','케이-집계약용','신한은행','전세 보증금','토스증권','미래에셋','삼성증권','우리IRP','농카','농카!','농카!실미','농카-','롯카','롯카!','롯카!실미','롯카-','신카','신카!','신카!실미','삼카','삼카!','국카1','국카k','국카k!','국카k!실미','국카k-','전세자금대출 원금(국민)','전세자금대출 원금(농협)','엄마신용대출 원금'];
const CMAP=[{k:['롯카!실미'],v:'롯카!실미'},{k:['롯카!'],v:'롯카!'},{k:['롯카-'],v:'롯카-'},{k:['롯데카드','로카','롯카'],v:'롯카'},{k:['신카!실미'],v:'신카!실미'},{k:['신카!'],v:'신카!'},{k:['신한카드','신카','FBS'],v:'신카'},{k:['삼카!'],v:'삼카!'},{k:['삼성카드','삼카'],v:'삼카'},{k:['국카k!실미'],v:'국카k!실미'},{k:['국카k!'],v:'국카k!'},{k:['국카k-'],v:'국카k-'},{k:['국카k'],v:'국카k'},{k:['국카1'],v:'국카1'},{k:['국민카드','KB카드','KB Pay','KB국민'],v:'국카k'},{k:['농카!실미'],v:'농카!실미'},{k:['농카!'],v:'농카!'},{k:['농카-'],v:'농카-'},{k:['농협카드','NH카드','농카'],v:'농카'},{k:['케이뱅크'],v:'케이뱅크'},{k:['KB뱅크','KB은행'],v:'KB뱅크'},{k:['NH뱅크','농협은행'],v:'NH뱅크'},{k:['하나은행','하나카드'],v:'하나은행'},{k:['신한은행'],v:'신한은행'}];

let cType='지출',selMaj='',selSub='',entries=[];
let curMon=new Date().toISOString().slice(0,7);
try{const s=localStorage.getItem('gb_v3');if(s)entries=JSON.parse(s);}catch(e){}

const today=new Date().toISOString().split('T')[0];
document.getElementById('f-date').value=today;
function buildSel(el){el.innerHTML='<option value="">선택</option>'+ACCOUNTS.map(a=>`<option value="${a}">${a}</option>`).join('');}
buildSel(document.getElementById('f-in-acct'));buildSel(document.getElementById('f-out-acct'));

function goPage(n,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+n).classList.add('active');btn.classList.add('active');
  if(n==='home')renderHome();if(n==='history')renderHist();if(n==='saving')renderSav();
}
function changeMonth(d){
  const[y,m]=curMon.split('-').map(Number);
  const nd=new Date(y,m-1+d,1);curMon=nd.toISOString().slice(0,7);
  renderHome();renderHist();
}
function me(){return entries.filter(e=>e.date&&e.date.startsWith(curMon));}

function renderHome(){
  const[y,m]=curMon.split('-');
  document.getElementById('month-label').textContent=`${y}년 ${parseInt(m)}월`;
  document.getElementById('hist-month').textContent=`${y}년 ${parseInt(m)}월 내역`;
  const es=me();
  const inc=es.filter(e=>e.type==='수입').reduce((s,e)=>s+e.amount,0);
  const exp=es.filter(e=>e.type==='지출').reduce((s,e)=>s+e.amount,0);
  const bal=inc-exp;
  document.getElementById('h-in').textContent=fmt(inc);
  document.getElementById('h-out').textContent=fmt(exp);
  const bEl=document.getElementById('h-bal');
  bEl.textContent=(bal<0?'-':'')+fmt(bal);
  bEl.style.color=bal>=0?'var(--green)':'var(--red)';

  const majT={};
  es.filter(e=>e.type==='지출').forEach(e=>{majT[e.major]=(majT[e.major]||0)+e.amount;});
  document.getElementById('budget-list').innerHTML=Object.entries(BUDGET).map(([c,b])=>{
    const s=majT[c]||0;if(b===0&&s===0)return'';
    const p=b>0?Math.min((s/b)*100,100):0;
    const ov=b>0&&s>b,wn=b>0&&s>b*.8;
    const gc=ov?'gr':wn?'gw':'go';
    const tag=ov?'<span class="tag to">초과</span>':wn?'<span class="tag tw">주의</span>':'';
    return`<div class="br"><div class="bt"><span class="bn">${c}${tag}</span><span class="bv"><span style="color:${ov?'var(--red)':'var(--text)'}">${fmtK(s)}</span> / ${fmtK(b)}</span></div><div class="gb"><div class="gf ${gc}" style="width:${p}%"></div></div></div>`;
  }).join('');

  const cdT={};
  es.filter(e=>e.type==='지출'&&e.outAcct).forEach(e=>{cdT[e.outAcct]=(cdT[e.outAcct]||0)+e.amount;});
  document.getElementById('card-list').innerHTML=Object.entries(CARD_BUDGET).map(([c,l])=>{
    const s=cdT[c]||0;if(l===0&&s===0)return'';
    const p=l>0?Math.min((s/l)*100,100):0;
    const ov=l>0&&s>l,wn=l>0&&s>l*.8;
    const gc=ov?'gr':wn?'gw':'go';
    return`<div class="cr"><div class="cn">${c}</div><div class="cb"><div class="gb"><div class="gf ${gc}" style="width:${p}%"></div></div></div><div class="cv"><b>${fmtK(s)}</b>/${fmtK(l)}</div></div>`;
  }).join('');
}

function setType(t){
  cType=t;selMaj='';selSub='';
  ['out','in','mv'].forEach(x=>document.getElementById('tb-'+x).className='tbtn');
  if(t==='지출')document.getElementById('tb-out').className='tbtn ao';
  if(t==='수입')document.getElementById('tb-in').className='tbtn ai';
  if(t==='이동')document.getElementById('tb-mv').className='tbtn am';
  const iw=document.getElementById('f-in-wrap'),ow=document.getElementById('f-out-wrap');
  if(t==='지출'){iw.classList.add('dis');ow.classList.remove('dis');}
  else if(t==='수입'){iw.classList.remove('dis');ow.classList.add('dis');}
  else{iw.classList.remove('dis');ow.classList.remove('dis');}
  buildMaj();document.getElementById('sub-sec').style.display='none';
}
function buildMaj(){
  document.getElementById('major-grid').innerHTML=Object.keys(CAT[cType]).map(m=>{
    const s=m===selMaj?' sel':'';
    return`<button class="cbtn${s}" onclick="selMajor('${m.replace(/'/g,"\\'")}')"><span style="font-size:18px">${m.split(' ')[0]}</span><br><span style="font-size:10px">${m.split(' ').slice(1).join(' ')}</span></button>`;
  }).join('');
}
function selMajor(m){
  selMaj=m;selSub='';buildMaj();
  document.getElementById('sub-grid').innerHTML=(CAT[cType][m]||[]).map(s=>`<button class="sbtn" onclick="selSubF('${s.replace(/'/g,"\\'")}',event)">${s}</button>`).join('');
  document.getElementById('sub-sec').style.display='block';
}
function selSubF(s,e){selSub=s;document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('sel'));e.target.classList.add('sel');}

function addEntry(){
  const amt=parseInt(document.getElementById('f-amount').value);
  if(!amt||amt<=0){showToast('금액을 입력해주세요');return;}
  if(!selMaj){showToast('대분류를 선택해주세요');return;}
  if(!selSub){showToast('소분류를 선택해주세요');return;}
  entries.unshift({id:Date.now(),date:document.getElementById('f-date').value,type:cType,major:selMaj,sub:selSub,memo:document.getElementById('f-memo').value,amount:amt,inAcct:document.getElementById('f-in-acct').value,outAcct:document.getElementById('f-out-acct').value});
  try{localStorage.setItem('gb_v3',JSON.stringify(entries.slice(0,500)));}catch(e){}
  document.getElementById('f-amount').value='';document.getElementById('f-memo').value='';
  showToast('✅ 추가됐어요!');renderHome();
}
function delEntry(id){entries=entries.filter(e=>e.id!==id);try{localStorage.setItem('gb_v3',JSON.stringify(entries));}catch(e){}renderHist();renderHome();}

function renderHist(){
  const es=me(),list=document.getElementById('entry-list');
  if(!es.length){list.innerHTML='<div class="empty">이달 내역이 없어요</div>';return;}
  list.innerHTML=es.map(e=>{
    const ii=e.type==='수입',im=e.type==='이동';
    const bg=ii?'var(--green-bg)':im?'var(--blue-bg)':'var(--red-bg)';
    const cl=ii?'ap':im?'av':'am2';const sg=ii?'+':im?'↔':'-';
    return`<div class="entry"><div class="ei" style="background:${bg}">${e.major.split(' ')[0]}</div><div class="einfo"><div class="edesc">${e.major.split(' ').slice(1).join(' ')} · ${e.sub}${e.memo?' · '+e.memo:''}</div><div class="emeta">${e.date}${e.outAcct?' · '+e.outAcct:''}${e.inAcct?' · '+e.inAcct:''}</div></div><div class="eamt ${cl}">${sg}${fmt(e.amount)}</div><button class="del" onclick="delEntry(${e.id})">✕</button></div>`;
  }).join('');
}

function renderSav(){
  const es=me();
  const mvT={};es.filter(e=>e.type==='이동').forEach(e=>{mvT[e.sub]=(mvT[e.sub]||0)+e.amount;});
  document.getElementById('saving-list').innerHTML=SAVE_GOALS.map(s=>{
    const a=mvT[s.name]||0,ok=s.goal===0||a>=s.goal;
    return`<div class="srow"><span class="sname">${s.name}</span><div class="sright"><div class="samt" style="color:${ok?'var(--green)':'var(--red)'}">${fmt(a)}</div>${s.goal>0?`<div class="sgoal">목표 ${fmt(s.goal)}</div>`:''}</div></div>`;
  }).join('');
  const totSav=es.filter(e=>e.type==='이동').reduce((s,e)=>s+e.amount,0);
  document.getElementById('act-sav').textContent=fmt(totSav);
  const inc=es.filter(e=>e.type==='수입').reduce((s,e)=>s+e.amount,0);
  const exp=es.filter(e=>e.type==='지출').reduce((s,e)=>s+e.amount,0);
  const sr=inc>0?Math.round((totSav/inc)*100):0;
  document.getElementById('inc-summary').innerHTML=`
    <div class="trow"><span class="tlbl">월 수입 목표</span><span class="tval" style="color:var(--blue)">₩5,600,000</span></div>
    <div class="trow"><span class="tlbl">이달 실제 수입</span><span class="tval" style="color:var(--green)">${fmt(inc)}</span></div>
    <div class="div"></div>
    <div class="trow"><span class="tlbl">이달 지출</span><span class="tval" style="color:var(--red)">${fmt(exp)}</span></div>
    <div class="trow"><span class="tlbl">이달 저축</span><span class="tval" style="color:var(--blue)">${fmt(totSav)}</span></div>
    <div class="trow"><span class="tlbl">저축률</span><span class="tval" style="color:${sr>=30?'var(--green)':'var(--amber)'}">${sr}%</span></div>`;
}

function parseNotif(v){
  const r={};
  const am=v.match(/([0-9][0-9,\.]+)\s*원/)||v.match(/[^잔]\s([0-9]{3,}[,\.][0-9]{3})/);
  if(am){const raw=am[1].replace(/[,\.]/g,'');if(parseInt(raw)>0)r.amount=parseInt(raw);}
  const dm=v.match(/(\d{1,2})\/(\d{2})/);
  if(dm)r.date=`${new Date().getFullYear()}-${dm[1].padStart(2,'0')}-${dm[2]}`;
  for(const m of CMAP){for(const k of m.k){if(v.includes(k)){r.card=m.v;break;}}if(r.card)break;}
  return r;
}
function onNotif(v){
  const p=document.getElementById('nprev');
  if(!v.trim()){p.style.display='none';return;}
  const r=parseNotif(v);
  let h=`<div style="white-space:pre-wrap;word-break:break-all;font-size:12px;color:var(--sub);margin-bottom:8px">${v.trim()}</div><div>`;
  if(r.amount)h+=`<span class="chip ca" onclick="apAmt(${r.amount})">💰 ${r.amount.toLocaleString()}원 ↓</span>`;
  if(r.date)h+=`<span class="chip cd" onclick="apDate('${r.date}')">📅 ${r.date} ↓</span>`;
  if(r.card)h+=`<span class="chip cc" onclick="apCard('${r.card}')">💳 ${r.card} ↓</span>`;
  if(!r.amount&&!r.date&&!r.card)h+='<span style="font-size:12px;color:var(--hint)">인식 항목 없음</span>';
  h+='</div>';p.style.display='block';p.innerHTML=h;
}
function apAmt(a){document.getElementById('f-amount').value=a;showToast(`${a.toLocaleString()}원 입력`);}
function apDate(d){document.getElementById('f-date').value=d;showToast(`${d} 입력`);}
function apCard(c){
  const sel=cType==='수입'?document.getElementById('f-in-acct'):document.getElementById('f-out-acct');
  for(let i=0;i<sel.options.length;i++){if(sel.options[i].value===c){sel.value=c;showToast(`${c} 선택`);return;}}
  showToast(`${c} 목록에 없어요`);
}
function clearNotif(){document.getElementById('notif-input').value='';const p=document.getElementById('nprev');p.style.display='none';p.innerHTML='';}

function exportXLSX(){
  const es=me();if(!es.length){showToast('내역이 없어요');return;}
  const rows=[['날짜','구분','대분류','소분류','내용','금액','입금계좌','출금계좌','9열'],...es.map(e=>[e.date,e.type,e.major,e.sub,e.memo,e.type==='지출'?-e.amount:e.amount,e.inAcct,e.outAcct,''])];
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:12},{wch:5},{wch:14},{wch:16},{wch:20},{wch:12},{wch:18},{wch:18},{wch:8}];
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'가계부');
  XLSX.writeFile(wb,`가계부_${curMon}.xlsx`);
}

function fmt(n){return'₩'+Math.abs(n).toLocaleString('ko-KR');}
function fmtK(n){return n>=10000?(n/10000).toFixed(n%10000===0?0:1)+'만':n.toLocaleString();}
let tt;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tt);tt=setTimeout(()=>t.classList.remove('show'),2000);}

setType('지출');renderHome();
</script>
